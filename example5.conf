server {
    listen 0.0.0.0:8080;
    server_name server1;
    client_max_body_size 2m;

    error_page 404 /errors/404.html;
    error_page 500 502 503 /errors/50x.html;

    location / {
        root /var/www/webapp;
        index index.html index.htm;
        methods GET POST;
        autoindex off;
    }

    location /api {
        root /var/www/webapp/api;
        methods GET POST DELETE;
    }

    location /upload {
        root /var/www/uploads;
        methods POST;
    }
}

server {
    listen localhost:8082;
    server_name server2;
    client_max_body_size 1M;

    error_page 404 /404.html;

    location / {
        root /var/www/static;
        index index.html;
        methods GET;
        autoindex on;
    }

    location /images {
        root /var/www/static/images;
        methods GET;
        autoindex on;
    }

    location /redirect {
        return 301 https://newdomain.com;
    }
}

server {
    listen 127.0.0.1:8083;
    server_name server3;
    client_max_body_size 2M;

    error_page 404 /errors/not_found.html;
    error_page 500 /errors/server_error.html;

    location / {
        root /var/www/cgi;
        index index.html;
        methods GET POST;
    }

    location /cgi-bin {
        root /var/www/cgi-bin;
        methods GET POST;
        # cgi_extension .py;
        # cgi_path /usr/bin/python3;
    }

    location /scripts {
        root /var/www/scripts;
        methods GET POST;
        # cgi_extension .sh;
        # cgi_path /bin/bash;
    }
}