server {
    listen 127.0.0.1:8085;
    listen 127.0.0.2:8085;
    server_name "Server 1";
    client_max_body_size 2m;
    keepalive_timeout 2;

    error_page 404 404.html;
    error_page 413 413.html;

    root /www/;

    autoindex on;

    cgi_handler .py /usr/bin/python3;

    location / {
        index index.html;
        root /www/;
        methods GET;
        autoindex off;
        client_max_body_size 10;
    }
    
    location /old {
        index old.txt;
        return 301 /new;
    }
    
    location /new {
        index new.txt;
        methods GET POST;
        upload_path www/uploads;
    }
    
    location /images
    {
        index cat.png;
        methods GET DELETE;
        autoindex off;
    }

    location /audios
    {
        methods GET;
        autoindex on;
    }

    location /uploads {
        methods GET POST DELETE;
        upload_path www/uploads;
        autoindex on;
    }
    
    location /invalid {
        methods DELETE;
        autoindex on;
    }

    location /cgi-bin {
        index script.py;
    }
}

