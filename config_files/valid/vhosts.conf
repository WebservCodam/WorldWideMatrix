# Two virtual hosts sharing 127.0.0.1:8085, told apart by the Host header.
server {
    listen 127.0.0.1:8085;
    server_name site_a;
    client_max_body_size 2m;
    root /www/site_a/;

    location / {
        root /www/site_a/;
        index index.html;
        methods GET;
    }

    # The locations below point at shared assets under www/ so the landing
    # page's links work without duplicating files.
    location /images {
        root /www/;
        methods GET;
        autoindex on;
    }
    location /audios {
        root /www/;
        methods GET;
        autoindex on;
    }
    location /old {
        root /www/;
        return 301 /new;
    }
    location /new {
        root /www/;
        index new.txt;
        methods GET;
    }
}

server {
    listen 127.0.0.1:8085;
    server_name site_b;
    client_max_body_size 2m;
    root /www/site_b/;

    location / {
        root /www/site_b/;
        index index.html;
        methods GET;
    }
}
