# Eval website - every curl on www/eval/index.html targets this single server.
# Run with:  ./webserv config_files/valid/eval.conf
server {
    listen 127.0.0.1:8085;
    server_name eval;
    client_max_body_size 2m;
    root /www/;

    error_page 404 404.html;
    error_page 413 413.html;

    # The eval website page itself. The location's own root overrides the server root.
    location / {
        root /www/eval/;
        index index.html;
        methods GET;
    }

    # Static files and directory listing (MIME types + autoindex).
    location /images {
        methods GET;
        autoindex on;
    }

    # POST creates a file here; DELETE removes it.
    location /uploads {
        methods GET POST DELETE;
        upload_path www/uploads;
        autoindex on;
    }

    # Redirect: /old to 301 to /new
    location /old {
        return 301 /new;
    }
    location /new {
        index new.txt;
        methods GET;
    }

    # Small body limit, to trigger 413 Payload Too Large.
    location /small {
        methods POST;
        upload_path www/uploads;
        client_max_body_size 10;
    }
}
