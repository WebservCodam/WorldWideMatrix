server {
    listen 8080;
    server_name server1;
    client_max_body_size 5M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 /errors/50x.html;

    location / {
        root /var/www/webapp;
        index index.html index.htm;
        allow_methods GET POST;
        autoindex off;
    }

    location /api {
        root /var/www/webapp/api;
        allow_methods GET POST DELETE;
    }

    location /upload {
        root /var/www/uploads;
        allow_methods POST;
    }
}

server {
    listen 8081;
    server_name server2;
    client_max_body_size 1M;

    error_page 404 /404.html;

    location / {
        root /var/www/static;
        index index.html;
        allow_methods GET;
        autoindex on;
    }

    location /images {
        root /var/www/static/images;
        allow_methods GET;
        autoindex on;
    }

    location /redirect {
        return 301 https://newdomain.com;
    }
}

server {
    listen 8082;
    server_name server3;
    client_max_body_size 2M;

    error_page 404 /errors/not_found.html;
    error_page 500 /errors/server_error.html;

    location / {
        root /var/www/cgi;
        index index.html;
        allow_methods GET POST;
    }

    location /cgi-bin {
        root /var/www/cgi-bin;
        allow_methods GET POST;
        # cgi_extension .py;
        # cgi_path /usr/bin/python3;
    }

    location /scripts {
        root /var/www/scripts;
        allow_methods GET POST;
        # cgi_extension .sh;
        # cgi_path /bin/bash;
    }
}