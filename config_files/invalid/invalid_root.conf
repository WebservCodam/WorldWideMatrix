server {
    listen localhost:8080;
    server_name "Server 1";
    client_max_body_size 2m;
    keepalive_timeout 2;

    error_page 404 /error_pages/404.html;
    error_page 500 502 503 /error_pages/50x.html;

    location / {
        root /lalalala/; # Invalid root
        index index.html;
        methods GET POST;
        autoindex off;
    }

    location /upload {
        root /www/uploads;
        methods POST;
    }
}