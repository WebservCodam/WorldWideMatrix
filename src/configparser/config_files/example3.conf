server {
    listen 0.0.0.0:8080;
    listen 127.0.0.1:8081;
    
    server_name worldwidematrix;
    client_max_body_size 10M;
    
    error_page 404 /errors/404.html;
    error_page 500 502 503 /errors/50x.html;
    
    location / {
        root /var/www/html;
        index index.html index.htm;
        methods [GET, POST, DELETE];
        autoindex on;
    }
    
    location /upload {
        root /var/www/uploads;
        methods [GET, POST, DELETE];
        upload_enable on;
        upload_store /tmp/uploads;
    }
    
    location /cgi-bin {
        root /var/www/cgi-bin;
        # cgi_enable on;
        cgi_extension .php;
        cgi_path /usr/bin/php-cgi;
    }
    
    location /redirect {
        return 301 https://newsite.com;
    }
}


class config
{
    private:
        std::map<std::string ip, std::string port>			addresses; //default 0.0.0.0:80
        std::string											server_name;
        std::int											maxbodysize;
        std::bool											autoindex;
        std::map<std::vector<int code>, std::string path>	error;
        std::vector<location::location>						location;
}

class location
{
    private:
        std::string	root;
        std::bool	get;
        std::bool	post;
        std::bool	delete;

        //cgi
        # std::bool   cgi_enable;
        std::string	cgi_extension;
        std::string	cgi_path;
}
