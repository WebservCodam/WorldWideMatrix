# -------------------------
# GLOBAL SETTINGS
# -------------------------

user  nginx;                 # Run worker processes as the 'nginx' user
worker_processes  auto;      # Spawn one worker per CPU core (auto = detect cores)
error_log  /var/log/nginx/error.log warn;   # Error log file + minimum log level
pid        /run/nginx.pid;   # File where nginx stores its master process PID


# -------------------------
# EVENTS BLOCK
# -------------------------
events {
    worker_connections  1024; # Each worker can handle up to 1024 client connections
}


# -------------------------
# HTTP BLOCK (all HTTP config goes here)
# -------------------------
http {
    # File types / MIME database
    include       /etc/nginx/mime.types;      # Maps extensions (.html, .jpg, etc.) to MIME types
    default_type  application/octet-stream;   # Default if unknown (binary stream)

    # Logging
    access_log  /var/log/nginx/access.log;    # Where HTTP access requests get logged

    # File transfer / connection handling
    sendfile        on;        # Use efficient kernel sendfile() to serve files
    keepalive_timeout  65;     # Keep connections alive for 65s

    # -------------------------
    # SERVER BLOCK (a virtual host)
    # -------------------------
    server {
        listen 8080;                # Listen on port 8080
        server_name localhost;      # Domain name (here just localhost)

        # -------------------------
        # ROOT LOCATION
        # -------------------------
        location / {
            root   /var/www/html;   # Files served from this directory
            index  index.html;      # Default file if / is requested
        }

        # -------------------------
        # ERROR PAGE
        # -------------------------
        error_page 404 /404.html;   # If a 404 occurs, serve /404.html
        location = /404.html {      # Exact match (=) for that error file
            root /var/www/errors;   # Directory where 404.html lives
        }

        # -------------------------
        # UPLOAD LOCATION
        # -------------------------
        location /upload {
            root   /var/www/uploads;       # Save uploaded files here
            client_max_body_size 10M;      # Limit request body to 10 MB
        }

        # -------------------------
        # CGI HANDLING
        # -------------------------
        location /cgi-bin/ {
            root /var/www;                 # CGI scripts live under /var/www/cgi-bin/
            fastcgi_pass  unix:/run/fcgiwrap.socket;  # Pass to FastCGI handler
            include       fastcgi_params;  # Load FastCGI environment variables
        }
    }
}
