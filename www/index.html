<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Page</title>
    <!-- Use the Inter font from Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <!-- Load Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Main content card -->
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center space-y-6">
        <!-- Main heading -->
        <h1 class="text-3xl font-bold text-gray-800">
            Welcome to My Simple Page
        </h1>

        <!-- A short description paragraph -->
        <p class="text-gray-600">
            This is a basic HTML page demonstrating a clean and responsive layout using Tailwind CSS.
        </p>

        <!-- A styled button with a hover effect -->
        <button onclick="showMessage()" class="w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-full shadow-lg hover:bg-blue-700 transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Click Me
        </button>

        <!-- Message box for the button click -->
        <div id="message-box" class="mt-4 p-4 text-sm text-blue-700 bg-blue-100 rounded-lg hidden" role="alert">
            <span class="font-medium">Hello!</span> You clicked the button.
        </div>
    </div>

    <!-- File upload card -->
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center space-y-4 mt-6">
        <h2 class="text-xl font-bold text-gray-800">Upload a File</h2>

        <input id="file-input" type="file"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />

        <button onclick="uploadFile()"
            class="w-full py-3 px-6 bg-green-600 text-white font-semibold rounded-full shadow-lg hover:bg-green-700 transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
            Upload
        </button>

        <div id="upload-result" class="hidden mt-2 p-4 text-sm rounded-lg"></div>
    </div>

    <script>
        function showMessage() {
            const messageBox = document.getElementById('message-box');
            if (messageBox.classList.contains('hidden')) {
                messageBox.classList.remove('hidden');
                messageBox.classList.add('block');
            } else {
                messageBox.classList.remove('block');
                messageBox.classList.add('hidden');
            }
        }

        async function uploadFile() {
            const input = document.getElementById('file-input');
            const result = document.getElementById('upload-result');

            if (!input.files.length) {
                showResult('Please select a file first.', false);
                return;
            }

            const file = input.files[0];
            const response = await fetch('/uploads/' + encodeURIComponent(file.name), {
                method: 'POST',
                body: await file.arrayBuffer(),
            });

            if (response.status === 201) {
                showResult('File uploaded successfully', true);
            } else {
                showResult('Upload failed: ' + response.status + ' ' + response.statusText, false);
            }
        }

        function showResult(message, success) {
            const result = document.getElementById('upload-result');
            result.textContent = message;
            result.className = 'mt-2 p-4 text-sm rounded-lg ' +
                (success ? 'text-green-700 bg-green-100' : 'text-red-700 bg-red-100');
            result.classList.remove('hidden');
        }
    </script>
</body>
</html>
