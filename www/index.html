<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <h1 class="text-3xl font-bold text-gray-800 text-center mb-10">Welcome to My Simple Page</h1>

    <div class="flex flex-col items-center gap-6">

        <!-- File upload card -->
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Upload a File</h2>

            <input id="file-input" type="file"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />

            <button onclick="uploadFile()"
                class="w-full py-3 px-6 bg-green-600 text-white font-semibold rounded-full shadow-lg hover:bg-green-700 transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                Upload
            </button>

            <div id="upload-result" class="hidden mt-2 p-4 text-sm rounded-lg"></div>
        </div>

        <!-- File delete card -->
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Delete a File</h2>

            <input id="delete-input" type="text" placeholder="filename (e.g. main.c)"
                class="block w-full text-sm text-gray-700 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-400" />

            <button onclick="deleteFile()"
                class="w-full py-3 px-6 bg-red-600 text-white font-semibold rounded-full shadow-lg hover:bg-red-700 transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                Delete
            </button>

            <div id="delete-result" class="hidden mt-2 p-4 text-sm rounded-lg"></div>
        </div>

    </div>

    <script>
        async function uploadFile() {
            const input = document.getElementById('file-input');

            if (!input.files.length) {
                showResult('Please select a file first.', false);
                return;
            }

            const file = input.files[0];
            const response = await fetch('/uploads/' + encodeURIComponent(file.name), {
                method: 'POST',
                body: await file.arrayBuffer(),
            });

            if (response.status === 201) {
                showResult('File uploaded successfully.', true);
            } else {
                showResult('Upload failed: ' + response.status + ' ' + response.statusText, false);
            }
        }

        async function deleteFile() {
            const input = document.getElementById('delete-input');
            const filename = input.value.trim();

            if (!filename) {
                showDeleteResult('Please enter a filename.', false);
                return;
            }

            const response = await fetch('/uploads/' + encodeURIComponent(filename), {
                method: 'DELETE',
            });

            if (response.status === 204) {
                showDeleteResult('File deleted successfully.', true);
            } else {
                showDeleteResult('Delete failed: ' + response.status + ' ' + response.statusText, false);
            }
        }

        function showResult(message, success) {
            const result = document.getElementById('upload-result');
            result.textContent = message;
            result.className = 'mt-2 p-4 text-sm rounded-lg ' +
                (success ? 'text-green-700 bg-green-100' : 'text-red-700 bg-red-100');
            result.classList.remove('hidden');
        }

        function showDeleteResult(message, success) {
            const result = document.getElementById('delete-result');
            result.textContent = message;
            result.className = 'mt-2 p-4 text-sm rounded-lg ' +
                (success ? 'text-green-700 bg-green-100' : 'text-red-700 bg-red-100');
            result.classList.remove('hidden');
        }
    </script>
</body>
</html>
